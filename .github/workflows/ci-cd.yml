name: Evaluate RoBERTa and Upload to Hugging Face

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  evaluate-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install transformers torch pandas scikit-learn huggingface_hub
      
      - name: Evaluate model
        run: python src/evaluate.py
      
      - name: Check accuracy threshold
        run: |
          ACC=$(python -c "import json; print(json.load(open('artifacts/metrics.json'))['accuracy'])")
          echo "Accuracy: $ACC"
          python -c "import json, sys; acc=json.load(open('artifacts/metrics.json'))['accuracy']; assert acc >= 0.92, f'Accuracy {acc} below 92%'; print(f'✅ Accuracy {acc*100:.2f}% meets threshold')"
      
      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          import os
          from huggingface_hub import HfApi
          
          token = os.environ['HF_TOKEN']
          repo_id = 'Ch1kage/Sentiment_analyse-HuggingFace'
          
          api = HfApi(token=token)
          api.create_repo(repo_id, repo_type='model', exist_ok=True)
          
          # 使用实例方法，token 已在初始化时传入
          api.upload_folder(
              folder_path='artifacts',
              repo_id=repo_id,
              repo_type='model'
          )
          
          print(f'Uploaded to https://huggingface.co/{repo_id}')
          "